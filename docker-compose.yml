version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sportsedge
      POSTGRES_PASSWORD: sportsedge_password
      POSTGRES_DB: sportsedge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsedge -d sportsedge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sportsedge:sportsedge_password@db:5432/sportsedge_db
      - ADMIN_TOKEN=secret_admin_token
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
