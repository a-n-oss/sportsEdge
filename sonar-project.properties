sonar.projectKey=a-n-oss_sportsEdge
sonar.organization=a-n-oss
sonar.projectName=a-n-oss_sportsEdge
sonar.projectVersion=1.0
sonar.python.version=3.12

# Base sources directory
sonar.sources=apps/api,apps/web/src

# Exclude test files, migrations, and binaries from source analysis
sonar.exclusions=**/tests/**,**/migrations/**,**/*.test.tsx,**/*.test.ts,**/node_modules/**,**/venv/**,**/.venv/**,**/*.ico,**/*.png,**/*.jpg,**/*.jpeg,**/*.svg,**/*.woff,**/*.woff2,**/*.ttf,**/*.eot

# Test files locations
sonar.tests=apps/api/tests,apps/web/src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/test_*.py

# Python Coverage
sonar.python.coverage.reportPaths=apps/api/coverage.xml

# JavaScript / TypeScript Coverage
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info