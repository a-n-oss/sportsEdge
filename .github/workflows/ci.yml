name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sportsedge
          POSTGRES_PASSWORD: sportsedge_password
          POSTGRES_DB: sportsedge_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true

    - name: Install dependencies
      working-directory: ./apps/api
      run: |
        uv venv
        uv pip install -r requirements.lock

    - name: Run Ruff Lint
      working-directory: ./apps/api
      run: uv run ruff check .

    - name: Run Pytest
      working-directory: ./apps/api
      env:
        DATABASE_URL: postgresql+asyncpg://sportsedge:sportsedge_password@localhost:5432/sportsedge_db
      run: uv run pytest --cov=. --cov-report=xml

    - name: Upload Backend Coverage
      uses: actions/upload-artifact@v7
      with:
        name: backend-coverage
        path: apps/api/coverage.xml
  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Install dependencies
      working-directory: ./apps/web
      run: pnpm install --ignore-scripts

    - name: Run ESLint
      working-directory: ./apps/web
      run: pnpm lint

    - name: Run Type Check
      working-directory: ./apps/web
      run: pnpm tsc --noEmit

    - name: Run Vitest
      working-directory: ./apps/web
      run: pnpm test

    - name: Upload Frontend Coverage
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: apps/web/coverage
  sonarqube:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Download Backend Coverage
      uses: actions/download-artifact@v8
      with:
        name: backend-coverage
        path: apps/api

    - name: Download Frontend Coverage
      uses: actions/download-artifact@v8
      with:
        name: frontend-coverage
        path: apps/web/coverage
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
